<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montana Shop | Exclusive Gaming Services</title>
    <style>
        :root {
            --main-blue: #00d2ff;
            --dark-blue: #0072ff;
            --accent: #ff4500;
            --glass: rgba(22, 27, 34, 0.85);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050505;
            color: white; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية متحركة بسيطة */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 80%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header img { 
            width: 130px; 
            border-radius: 50%; 
            border: 3px solid var(--main-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transition: 0.5s;
        }
        .header img:hover { transform: rotate(5deg) scale(1.05); }

        h1 { font-size: 1.8rem; margin: 15px 0 5px; letter-spacing: 2px; text-shadow: 0 0 10px var(--main-blue); }
        .tagline { font-size: 0.9rem; color: var(--main-blue); opacity: 0.8; margin-bottom: 20px; }

        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #ccc; padding-right: 5px; }

        input, select {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--main-blue); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .row { display: flex; gap: 15px; }

        .btn-submit {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(90deg, var(--dark-blue), var(--main-blue));
            border: none; border-radius: 12px; color: white;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-transform: uppercase;
        }

        .btn-submit:hover { 
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6); 
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .features {
            display: flex; justify-content: space-around; margin-top: 30px;
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .feature-item { font-size: 0.75rem; color: #888; text-align: center; }
        .feature-item i { display: block; color: var(--main-blue); margin-bottom: 5px; font-size: 1rem; }

        .copyright { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #555; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/image_030441.jpg" alt="Montana Logo">
        <h1>MONTANA SHOP</h1>
        <div class="tagline">Premium Gaming Solutions & Accounts</div>
    </div>

    <div class="form-group">
        <label>الإسم الكامل</label>
        <input type="text" id="name" placeholder="أدخل اسمك هنا...">
    </div>

    <div class="row">
        <div class="form-group" style="flex: 1.5;">
            <label>رقم الهاتف</label>
            <input type="text" id="phone" placeholder="06 / 07 / 05">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>وسيلة التواصل</label>
            <select id="contactType">
                <option value="Discord">Discord</option>
                <option value="WhatsApp">WhatsApp</option>
                <option value="Messenger">Messenger</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>معرف التواصل (ID / User)</label>
        <input type="text" id="contactUser" placeholder="@username or link">
    </div>

    <div class="form-group">
        <label>المنتج المطلوب</label>
        <select id="product">
            <option value="Steam Account +300">Steam Account +300 - 1000 DA</option>
            <option value="GTA V Roleplay">GTA V Roleplay - 900 DA</option>
            <option value="Discord Nitro">Discord Nitro - 1600 DA</option>
            <option value="Visa Card Activation">Visa Card Activation - 3000 DA</option>
            <option value="FC26 Ultimate">FC26 Ultimate - 6000 DA</option>
            <option value="Gaming Points">شحن رصيد ألعاب (PUBG/FF)</option>
        </select>
    </div>

    <button class="btn-submit" onclick="sendOrder()">تأكيد الطلب الآن</button>

    <div class="features">
        <div class="feature-item">⚡ تسليم سريع</div>
        <div class="feature-item">🛡️ ضمان كامل</div>
        <div class="feature-item">🎧 دعم 24/7</div>
    </div>

    <div class="copyright">
        © 2026 MONTANA SHOP | POWERED BY MONTANA MARKET
    </div>
</div>

<script>
async function sendOrder() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const product = document.getElementById('product').value;
    const contactType = document.getElementById('contactType').value;
    const contactUser = document.getElementById('contactUser').value;

    const webhook = "https://discord.com/api/webhooks/1485369664342327386/xCE5W6nHpLNrrK9gIaqBy2JFuEysWrrdCRyI3oHjqjGL9nxVmVrVRNwP5rjzLyu8BPyc";

    if(!name || !phone || !contactUser) {
        alert("يرجى ملء كافة الخانات المطلوبة");
        return;
    }

    const payload = {
        username: "Montana System",
        avatar_url: "https://i.ibb.co/image_030441.jpg",
        embeds: [{
            title: "💎 طلب شراء جديد!",
            description: "وصلت طلبية جديدة من واجهة المتجر الرئيسية.",
            color: 53759,
            fields: [
                { name: "👤 العميل", value: name, inline: true },
                { name: "📱 الهاتف", value: phone, inline: true },
                { name: "🎮 المنتج", value: `**${product}**`, inline: false },
                { name: `🔗 ${contactType}`, value: `\`${contactUser}\``, inline: true }
            ],
            footer: { text: "Montana Shop - Order Management" },
            timestamp: new Date()
        }]
    };

    try {
        const res = await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if(res.ok) alert("✅ تم إرسال طلبك! ترقب تواصلنا معك قريباً.");
        else alert("❌ فشل الإرسال، تواصل مع الدعم الفني.");
    } catch(e) { alert("❌ خطأ في الاتصال بالشبكة."); }
}
</script>

</body>
</html>
