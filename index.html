<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montana Shop - طلب شراء</title>
    <style>
        :root {
            --primary-color: #00d2ff; /* اللون الأزرق السماوي من اللوغو */
            --accent-color: #ff4500;  /* البرتقالي للتباين */
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at center, #1a2634 0%, #0a0e14 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .order-box { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 210, 255, 0.3); 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 15px rgba(0, 210, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* إضافة خط مضيء في أعلى الكرت */
        .order-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { width: 120px; border-radius: 50%; border: 2px solid var(--primary-color); padding: 5px; box-shadow: 0 0 15px var(--primary-color); }

        h2 { text-align: center; color: white; margin: 10px 0; font-size: 1.4rem; letter-spacing: 1px; }
        .subtitle { text-align: center; color: var(--primary-color); font-size: 0.8rem; margin-bottom: 25px; opacity: 0.8; }

        label { display: block; margin-top: 15px; font-size: 0.85rem; color: #8b949e; font-weight: 600; }
        
        input, select { 
            width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px; 
            border: 1px solid #30363d; background: #0d1117; color: white; 
            box-sizing: border-box; outline: none; transition: all 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary-color); box-shadow: 0 0 8px rgba(0, 210, 255, 0.2); }

        .flex-row { display: flex; gap: 12px; margin-top: 6px; }

        button { 
            width: 100%; padding: 15px; margin-top: 30px; 
            background: linear-gradient(45deg, var(--primary-color), #0072ff); 
            color: white; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; font-size: 1.1rem; 
            transition: 0.4s; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5); }

        .footer-rights { 
            margin-top: 25px; text-align: center; font-size: 0.75rem; color: #484f58; 
            border-top: 1px solid #30363d; padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="order-box">
    <div class="logo-container">
        <img src="https://i.ibb.co/image_030441.jpg" alt="Montana Shop Logo">
    </div>
    
    <h2>MONTANA SHOP</h2>
    <p class="subtitle">Gaming Products & Steam Accounts</p>
    
    <label>👤 الإسم الكامل</label>
    <input type="text" id="name" placeholder="أدخل اسمك الكريم" required>

    <label>📱 رقم الهاتف</label>
    <input type="text" id="phone" placeholder="06 / 07 / 05" required>

    <label>📧 البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@gmail.com">

    <label>🎮 اختر طلبك</label>
    <select id="product">
        <optgroup label="حسابات وخدمات">
            <option value="Steam Account +300 Games">Steam Account +300 - 1000 DA</option>
            <option value="GTA V Roleplay">GTA V Roleplay - 900 DA</option>
            <option value="Discord Nitro">Discord Nitro - 1600 DA</option>
            <option value="Visa Card Activation">Visa Card Activation - 3000 DA</option>
        </optgroup>
        <optgroup label="ألعاب وشحن">
            <option value="FC26 Ultimate">FC26 Ultimate Edition - 6000 DA</option>
            <option value="Free Fire Diamonds">شحن جواهر فري فاير</option>
            <option value="PUBG Mobile UC">شحن شدات ببجي</option>
        </optgroup>
    </select>

    <label>🔗 وسيلة التواصل المفضلة</label>
    <div class="flex-row">
        <select id="contactType" style="flex: 1;">
            <option value="Discord">Discord</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Messenger">Messenger</option>
            <option value="Instagram">Instagram</option>
        </select>
        <input type="text" id="contactUser" placeholder="اليوزر أو الرابط" style="flex: 1.5;">
    </div>

    <button onclick="sendToDiscord()">تأكيد وإرسال الطلب</button>

    <div class="footer-rights">
        © 2026 Montana Shop. All Rights Reserved.<br>
        Developed by Montana Market Team
    </div>
</div>

<script>
async function sendToDiscord() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const email = document.getElementById('email').value || "غير متوفر";
    const product = document.getElementById('product').value;
    const contactType = document.getElementById('contactType').value;
    const contactUser = document.getElementById('contactUser').value;

    const webhookURL = "https://discord.com/api/webhooks/1485369664342327386/xCE5W6nHpLNrrK9gIaqBy2JFuEysWrrdCRyI3oHjqjGL9nxVmVrVRNwP5rjzLyu8BPyc";

    if(!name || !phone || !contactUser) {
        alert("يرجى إكمال البيانات الأساسية قبل الإرسال");
        return;
    }

    const payload = {
        username: "Montana Shop Monitor",
        avatar_url: "https://i.ibb.co/image_030441.jpg",
        embeds: [{
            title: "📥 طلب شراء جديد من Montana Shop",
            color: 53759, // لون أزرق سماوي ليناسب اللوغو
            fields: [
                { name: "👤 العميل", value: `\`${name}\``, inline: true },
                { name: "📱 الهاتف", value: `\`${phone}\``, inline: true },
                { name: "🎮 المنتج", value: `**${product}**`, inline: false },
                { name: "📧 الإيميل", value: email, inline: true },
                { name: `🔗 التواصل (${contactType})`, value: `\`${contactUser}\``, inline: true }
            ],
            footer: { text: "الطلب قادم من واجهة الموقع الرسمية" },
            timestamp: new Date()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("✅ تم استلام طلبك! فريق Montana Shop سيتواصل معك قريباً.");
        } else {
            alert("❌ حدث خطأ، تأكد من إعدادات الويب هوك.");
        }
    } catch (error) {
        alert("❌ تعذر الإرسال، تحقق من اتصالك.");
    }
}
</script>

</body>
</html>
