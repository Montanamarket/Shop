<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montana Shop | متجر مونتانا للخدمات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #0072ff;
            --accent: #ff4500;
            --bg: #050505;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg);
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: white; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية المتجر مع تأثير الزجاج المضيء */
        .shop-card {
            width: 90%;
            max-width: 480px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 210, 255, 0.1);
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
            margin-bottom: 15px;
        }

        h1 { font-size: 1.6rem; margin: 10px 0; letter-spacing: 1px; }
        .tagline { color: var(--primary); font-size: 0.85rem; margin-bottom: 25px; opacity: 0.9; }

        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #888; }

        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid #333; border-radius: 10px; color: white;
            font-family: 'Cairo', sans-serif; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .btn-order {
            width: 100%; padding: 15px; margin-top: 25px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border: none; border-radius: 12px; color: white;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            transition: 0.4s; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-order:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5); }

        .footer-info { margin-top: 25px; font-size: 0.7rem; color: #444; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

<div class="shop-card">
    <img src="https://i.ibb.co/image_030441.jpg" alt="Montana Logo" class="logo">
    <h1>MONTANA SHOP</h1>
    <p class="tagline">أفضل الخدمات الرقمية والألعاب في مكان واحد</p>

    <div class="input-group">
        <label>الإسم الكامل</label>
        <input type="text" id="cust_name" placeholder="مثال: محمد الجزائري">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1.5;">
            <label>رقم الهاتف</label>
            <input type="text" id="cust_phone" placeholder="06 / 07 / 05">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>الوسيلة</label>
            <select id="contact_type">
                <option value="Discord">ديسكورد</option>
                <option value="WhatsApp">واتساب</option>
                <option value="Facebook">فيسبوك</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>يوزر التواصل أو الرابط</label>
        <input type="text" id="cust_social" placeholder="@username">
    </div>

    <div class="input-group">
        <label>اختر المنتج المطلوب</label>
        <select id="cust_product">
            <option value="Steam Account +300">Steam Account +300 - 1000 DA</option>
            <option value="GTA V Roleplay">GTA V Roleplay - 900 DA</option>
            <option value="Discord Nitro">Discord Nitro - 1600 DA</option>
            <option value="FC26 Ultimate">FC26 Ultimate - 6000 DA</option>
            <option value="Visa Card Activation">تفعيل بطاقة فيزا - 3000 DA</option>
        </select>
    </div>

    <button class="btn-order" onclick="submitOrder()">إرسال الطلب الآن</button>

    <div class="footer-info">
        جميع الحقوق محفوظة لمتجر مونتانا © 2026<br>
        MONTANA MARKET SOLUTIONS
    </div>
</div>
